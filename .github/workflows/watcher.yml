name: Disney Comics Watcher

on:
  schedule:
    # Toutes les heures, à la minute 0
    - cron: "0 * * * *"
  workflow_dispatch: # Lancement manuel depuis l'onglet Actions



jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Nécessaire pour pusher sur la branche datas

    steps:
      # 1. Checkout du code (branche main)
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      # 2. Récupérer le state.json, issues/ et covers/ depuis la branche datas
      - name: Récupérer state, issues et covers
        run: |
          git fetch origin datas 2>/dev/null || true
          git checkout origin/datas -- state.json 2>/dev/null || echo '{}' > state.json
          git checkout origin/datas -- issues/ 2>/dev/null || true
          git checkout origin/datas -- covers/ 2>/dev/null || true
          echo "State chargé : $(wc -c < state.json) octets"

      # 3. Python
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # 4. Dépendances
      - name: Installer les dépendances
        run: pip install requests beautifulsoup4

      # 5. Lancer le watcher
      - name: Lancer le watcher
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_THREAD_ID_FR: ${{ secrets.TELEGRAM_THREAD_ID_FR }}
          TELEGRAM_THREAD_ID_US: ${{ secrets.TELEGRAM_THREAD_ID_US }}
          TELEGRAM_THREAD_ID_DE: ${{ secrets.TELEGRAM_THREAD_ID_DE }}
          TELEGRAM_THREAD_ID_GR: ${{ secrets.TELEGRAM_THREAD_ID_GR }}
          TELEGRAM_ADMIN_ID: ${{ secrets.TELEGRAM_ADMIN_ID }}
          AMAZON_AFFILIATE_TAG: ${{ secrets.AMAZON_AFFILIATE_TAG }}
        run: python check_magazines.py


      # 6. Pousser le state et les données mis à jour sur la branche datas
      - name: Sauvegarder state, issues et covers
        if: always() # Toujours sauvegarder, même en cas d'erreur partielle
        run: |
          # Sauvegarder les données dans /tmp avant de changer de branche
          cp state.json /tmp/state_updated.json
          mkdir -p /tmp/issues_updated /tmp/covers_updated
          cp -r issues/* /tmp/issues_updated/ 2>/dev/null || true
          
          # Exclude covers_updated to prevent infinite nesting
          rsync -a --exclude='covers_updated' covers/ /tmp/covers_updated/ 2>/dev/null || true

          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Stash any local modifications to prevent checkout conflicts
          git stash push -m "stashing before branch change" || true

          # Basculer sur la branche datas (ou la créer si elle n'existe pas encore)
          if git ls-remote --exit-code --heads origin datas > /dev/null 2>&1; then
            git fetch origin datas
            git checkout -B datas origin/datas
          else
            git checkout --orphan datas
            git rm -rf . --quiet 2>/dev/null || true
          fi

          # Restaurer les fichiers
          cp /tmp/state_updated.json state.json
          mkdir -p issues covers
          cp -r /tmp/issues_updated/* issues/ 2>/dev/null || true
          cp -r /tmp/covers_updated/* covers/ 2>/dev/null || true
          
          # Écrire le state et le cache, et commiter s'il y a des changements
          # On utilise -f au cas où le .gitignore empêcherait l'ajout des dossiers
          git add -f state.json
          if [ -d "issues" ]; then git add -f issues/; fi
          if [ -d "covers" ]; then git add -f covers/; fi
          
          if git diff --cached --quiet; then
            echo "Aucun changement dans le state, issues ou covers — rien à commiter."
          else
            git commit -m "update datas: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push origin datas --force
          fi
