name: Disney Comics Watcher

on:
  schedule:
    # Every hour, at minute 0
    - cron: "0 * * * *"
  workflow_dispatch: # Manual trigger from the Actions tab

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required to push to the datas branch

    steps:
      # 1. Checkout code (main branch)
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      # 2. Retrieve state.json, issues/, and covers/ from the datas branch
      - name: Retrieve state, issues and covers
        run: |
          git fetch origin datas 2>/dev/null || true
          git checkout origin/datas -- state.json 2>/dev/null || echo '{}' > state.json
          git checkout origin/datas -- issues/ 2>/dev/null || true
          git checkout origin/datas -- covers/ 2>/dev/null || true
          echo "State loaded: $(wc -c < state.json) bytes"

      # 3. Python
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # 4. Dependencies
      - name: Install dependencies
        run: pip install requests beautifulsoup4

      # 5. Run the watcher
      - name: Run the watcher
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_THREAD_ID_FR: ${{ secrets.TELEGRAM_THREAD_ID_FR }}
          TELEGRAM_THREAD_ID_US: ${{ secrets.TELEGRAM_THREAD_ID_US }}
          TELEGRAM_THREAD_ID_DE: ${{ secrets.TELEGRAM_THREAD_ID_DE }}
          TELEGRAM_THREAD_ID_GR: ${{ secrets.TELEGRAM_THREAD_ID_GR }}
          TELEGRAM_THREAD_ID_IT: ${{ secrets.TELEGRAM_THREAD_ID_IT }}
          TELEGRAM_THREAD_ID_BR: ${{ secrets.TELEGRAM_THREAD_ID_BR }}
          TELEGRAM_THREAD_ID_EG: ${{ secrets.TELEGRAM_THREAD_ID_EG }}
          TELEGRAM_THREAD_ID_BG: ${{ secrets.TELEGRAM_THREAD_ID_BG }}
          TELEGRAM_THREAD_ID_HR: ${{ secrets.TELEGRAM_THREAD_ID_HR }}
          TELEGRAM_THREAD_ID_EE: ${{ secrets.TELEGRAM_THREAD_ID_EE }}
          TELEGRAM_THREAD_ID_LV: ${{ secrets.TELEGRAM_THREAD_ID_LV }}
          TELEGRAM_THREAD_ID_LT: ${{ secrets.TELEGRAM_THREAD_ID_LT }}
          TELEGRAM_THREAD_ID_PL: ${{ secrets.TELEGRAM_THREAD_ID_PL }}
          TELEGRAM_THREAD_ID_CZ: ${{ secrets.TELEGRAM_THREAD_ID_CZ }}
          TELEGRAM_THREAD_ID_RS: ${{ secrets.TELEGRAM_THREAD_ID_RS }}
          TELEGRAM_THREAD_ID_SI: ${{ secrets.TELEGRAM_THREAD_ID_SI }}
          TELEGRAM_THREAD_ID_CN: ${{ secrets.TELEGRAM_THREAD_ID_CN }}
          TELEGRAM_THREAD_ID_DK: ${{ secrets.TELEGRAM_THREAD_ID_DK }}
          TELEGRAM_THREAD_ID_ES: ${{ secrets.TELEGRAM_THREAD_ID_ES }}
          TELEGRAM_THREAD_ID_FI: ${{ secrets.TELEGRAM_THREAD_ID_FI }}
          TELEGRAM_THREAD_ID_IS: ${{ secrets.TELEGRAM_THREAD_ID_IS }}
          TELEGRAM_THREAD_ID_NO: ${{ secrets.TELEGRAM_THREAD_ID_NO }}
          TELEGRAM_THREAD_ID_NL: ${{ secrets.TELEGRAM_THREAD_ID_NL }}
          TELEGRAM_THREAD_ID_UK: ${{ secrets.TELEGRAM_THREAD_ID_UK }}
          TELEGRAM_THREAD_ID_SE: ${{ secrets.TELEGRAM_THREAD_ID_SE }}
          TELEGRAM_ADMIN_ID: ${{ secrets.TELEGRAM_ADMIN_ID }}
          AMAZON_AFFILIATE_TAG: ${{ secrets.AMAZON_AFFILIATE_TAG }}
        run: python check_magazines.py


      # 6. Push updated state and data to the datas branch
      - name: Save state, issues and covers
        if: always() # Always save, even on partial error
        run: |
          # Save data to /tmp before switching branches
          cp state.json /tmp/state_updated.json
          mkdir -p /tmp/issues_updated /tmp/covers_updated
          cp -r issues/* /tmp/issues_updated/ 2>/dev/null || true
          
          # Exclude covers_updated to prevent infinite nesting
          rsync -a --exclude='covers_updated' covers/ /tmp/covers_updated/ 2>/dev/null || true

          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Stash any local modifications to prevent checkout conflicts
          git stash push -m "stashing before branch change" || true

          # Switch to the datas branch (or create it if it doesn't exist)
          if git ls-remote --exit-code --heads origin datas > /dev/null 2>&1; then
            git fetch origin datas
            git checkout -B datas origin/datas
          else
            git checkout --orphan datas
            git rm -rf . --quiet 2>/dev/null || true
          fi

          # Restore files
          cp /tmp/state_updated.json state.json
          mkdir -p issues covers
          cp -r /tmp/issues_updated/* issues/ 2>/dev/null || true
          cp -r /tmp/covers_updated/* covers/ 2>/dev/null || true
          
          # Write state and cache, and commit if there are changes
          # Use -f in case .gitignore prevents adding the folders
          git add -f state.json
          if [ -d "issues" ]; then git add -f issues/; fi
          if [ -d "covers" ]; then git add -f covers/; fi
          
          if git diff --cached --quiet; then
            echo "No changes in state, issues, or covers — nothing to commit."
          else
            git commit -m "update datas: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push origin datas --force
          fi
